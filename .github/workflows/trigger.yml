name: Trigger Flow

on:
  # push:
  #   branches: [main, 'feature/**']
  #   paths: ['src/**', 'scripts/**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispath:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [staging, production]
      run_tests:
        description: 'Run test suite'
        required: false
        type: boolean
        default: true 

jobs:
  steps:
    runs-on: ubuntu-latest
  
        
