name: GH-200 Cohack

on: push

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello! From GH-200 session"
        
      - name: copy code into runner
        uses: actions/checkout@v6

      - name: List files
        run: ls -la

      - name: Generate ASCII Art
        run: |
          sudo apt-get install -y figlet
          figlet "GH-200 CoHack"
          echo "-----------------------"
          figlet -f slant "Github Actions"
          echo "ASCII Generated Art"
      
